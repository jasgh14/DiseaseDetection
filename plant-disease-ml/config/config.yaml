data:
  root: "data/images"         # path to image folder
  labels_csv: "data/labels.csv"  # CSV with columns: image,labels
  label_map: "data/label_map.json"  # generated if missing
  num_workers: 4
  img_size: 224
  batch_size: 32
  val_size: 0.15
  seed: 42

model:
  name: "resnet50"            # resnet50 | efficientnet_b0 | vit_b_16
  pretrained: true

train:
  epochs: 10
  lr: 0.0003          # ✅ not "0.0003"
  weight_decay: 0.0001
  optimizer: adam
  mixed_precision: true
  freeze_backbone_epochs: 1
  device: cuda
  grad_clip: 1.0
  early_stop_patience: 5
  out_dir: "runs"

inference:
  threshold: 0.5
